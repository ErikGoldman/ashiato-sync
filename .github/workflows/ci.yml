name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      benchmark_subset:
        description: Benchmark subset to run
        required: true
        default: characteristic
        type: choice
        options:
          - characteristic
          - cpu
          - bandwidth
          - all
      cpu_benchmark_filter:
        description: Optional Google Benchmark regex. Overrides the default CPU subset.
        required: false
        default: ''
        type: string
      bandwidth_scenarios:
        description: Optional comma-separated scenarios. Valid examples are ball_snap_baseline, ball_buffered_latency, prediction_rollback_mixed.
        required: false
        default: ''
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-coverage:
    name: Test and coverage
    runs-on: ubuntu-latest
    outputs:
      coverage: ${{ steps.coverage-badge.outputs.coverage }}
      color: ${{ steps.coverage-badge.outputs.color }}
      ci_message: ${{ steps.ci-badge.outputs.message }}
      ci_color: ${{ steps.ci-badge.outputs.color }}

    defaults:
      run:
        working-directory: ashiato-sync

    steps:
      - name: Check out ashiato-sync
        uses: actions/checkout@v6
        with:
          path: ashiato-sync

      - name: Check out Ashiato ECS
        uses: actions/checkout@v6
        with:
          repository: ErikGoldman/ashiato
          path: main
          token: ${{ secrets.ASHIATO_CHECKOUT_TOKEN || github.token }}

      - name: Configure
        id: configure
        run: >
          cmake -S . -B build-coverage
          -DCMAKE_BUILD_TYPE=Debug
          -DBUILD_TESTING=ON
          -DASHIATO_SYNC_BUILD_BENCHMARKS=OFF
          -DASHIATO_SYNC_BUILD_EXAMPLES=OFF
          -DASHIATO_SYNC_BUILD_TRACE_VIEWER=OFF
          -DASHIATO_SYNC_ENABLE_COVERAGE=ON
          -DASHIATO_SYNC_ASHIATO_SOURCE_DIR=${{ github.workspace }}/main

      - name: Build tests, run tests, and collect coverage
        id: coverage
        shell: bash
        run: |
          set -o pipefail
          cmake --build build-coverage --parallel --target coverage | tee build-coverage/coverage.log

      - name: Create coverage badge
        id: coverage-badge
        shell: bash
        run: |
          coverage="$(sed -n 's/^-- Line coverage: \([0-9.]*\)%.*/\1/p' build-coverage/coverage.log | tail -n 1)"
          if [[ -z "${coverage}" ]]; then
            echo "Unable to find line coverage in build-coverage/coverage.log" >&2
            exit 1
          fi

          coverage_int="${coverage%.*}"
          color="red"
          if (( coverage_int >= 90 )); then
            color="brightgreen"
          elif (( coverage_int >= 80 )); then
            color="green"
          elif (( coverage_int >= 70 )); then
            color="yellowgreen"
          elif (( coverage_int >= 60 )); then
            color="yellow"
          elif (( coverage_int >= 50 )); then
            color="orange"
          fi

          mkdir -p badge
          printf '{"schemaVersion":1,"label":"coverage","message":"%s%%","color":"%s"}\n' "${coverage}" "${color}" > badge/coverage.json
          echo "coverage=${coverage}" >> "${GITHUB_OUTPUT}"
          echo "color=${color}" >> "${GITHUB_OUTPUT}"

      - name: Create CI badge
        id: ci-badge
        if: always()
        shell: bash
        run: |
          message="passing"
          color="brightgreen"
          if [[ "${CONFIGURE_OUTCOME}" != "success" || "${COVERAGE_OUTCOME}" != "success" || "${COVERAGE_BADGE_OUTCOME}" != "success" ]]; then
            message="failing"
            color="red"
          fi

          mkdir -p badge
          printf '{"schemaVersion":1,"label":"CI","message":"%s","color":"%s"}\n' "${message}" "${color}" > badge/ci.json
          echo "message=${message}" >> "${GITHUB_OUTPUT}"
          echo "color=${color}" >> "${GITHUB_OUTPUT}"
        env:
          CONFIGURE_OUTCOME: ${{ steps.configure.outcome }}
          COVERAGE_OUTCOME: ${{ steps.coverage.outcome }}
          COVERAGE_BADGE_OUTCOME: ${{ steps.coverage-badge.outcome }}

  memory-smoke:
    name: End-to-end memory smoke
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ashiato-sync

    env:
      ASAN_OPTIONS: detect_leaks=1:halt_on_error=1:strict_string_checks=1
      UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1

    steps:
      - name: Check out ashiato-sync
        uses: actions/checkout@v6
        with:
          path: ashiato-sync

      - name: Check out Ashiato ECS
        uses: actions/checkout@v6
        with:
          repository: ErikGoldman/ashiato
          path: main
          token: ${{ secrets.ASHIATO_CHECKOUT_TOKEN || github.token }}

      - name: Configure sanitizer smoke build
        run: >
          cmake -S . -B build-memory-smoke
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DCMAKE_CXX_COMPILER=clang++
          -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer -g"
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"
          -DCMAKE_SHARED_LINKER_FLAGS="-fsanitize=address,undefined"
          -DBUILD_TESTING=OFF
          -DASHIATO_SYNC_BUILD_BENCHMARKS=ON
          -DASHIATO_SYNC_BUILD_EXAMPLES=OFF
          -DASHIATO_SYNC_BUILD_TRACE_VIEWER=OFF
          -DASHIATO_SYNC_ASHIATO_SOURCE_DIR=${{ github.workspace }}/main
          -DASHIATO_SYNC_BALL_STRESS_RUN_ARGS="--duration-seconds 5 --report text"
          -DASHIATO_SYNC_PREDICTION_STRESS_RUN_ARGS="--ticks 900 --latency-frames 10 --misprediction-percent 5 --report text"

      - name: Build end-to-end smoke tools
        run: cmake --build build-memory-smoke --parallel --target ashiato_sync_ball_stress ashiato_sync_prediction_stress

      - name: Run ball stress under sanitizers
        run: cmake --build build-memory-smoke --target run_ashiato_sync_ball_stress

      - name: Run prediction stress under sanitizers
        run: cmake --build build-memory-smoke --target run_ashiato_sync_prediction_stress

  benchmarks:
    name: Characteristic benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    defaults:
      run:
        working-directory: ashiato-sync

    steps:
      - name: Check out ashiato-sync
        uses: actions/checkout@v6
        with:
          path: ashiato-sync

      - name: Check out Ashiato ECS
        uses: actions/checkout@v6
        with:
          repository: ErikGoldman/ashiato
          path: main
          token: ${{ secrets.ASHIATO_CHECKOUT_TOKEN || github.token }}

      - name: Configure benchmarks
        run: >
          cmake -S . -B build-benchmarks
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DBUILD_TESTING=OFF
          -DASHIATO_SYNC_BUILD_BENCHMARKS=ON
          -DASHIATO_SYNC_BUILD_EXAMPLES=OFF
          -DASHIATO_SYNC_BUILD_TRACE_VIEWER=OFF
          -DASHIATO_SYNC_ASHIATO_SOURCE_DIR=${{ github.workspace }}/main

      - name: Build benchmarks
        run: cmake --build build-benchmarks --parallel --target ashiato_sync_benchmark ashiato_sync_ball_stress ashiato_sync_prediction_stress

      - name: Run benchmarks
        run: >
          python3 scripts/ci/run_benchmarks.py
          --build-dir build-benchmarks
          --output-dir benchmark-results
          --subset "${{ inputs.benchmark_subset || 'characteristic' }}"
          --cpu-filter "${{ inputs.cpu_benchmark_filter || '' }}"
          --bandwidth-scenarios "${{ inputs.bandwidth_scenarios || '' }}"
          --commit "${{ github.sha }}"
          --ref "${{ github.ref_name }}"
          --run-id "${{ github.run_id }}"
          --run-attempt "${{ github.run_attempt }}"
          --repository "${{ github.repository }}"

      - name: Upload benchmark result artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: ashiato-sync/benchmark-results

  publish-pages:
    name: Publish Pages
    runs-on: ubuntu-latest
    needs:
      - test-and-coverage
      - memory-smoke
      - benchmarks
    if: always() && github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: write
      actions: read

    steps:
      - name: Check out ashiato-sync
        uses: actions/checkout@v6
        with:
          path: ashiato-sync

      - name: Check out Pages branch
        id: checkout-pages
        continue-on-error: true
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: site

      - name: Create Pages branch checkout
        if: steps.checkout-pages.outcome != 'success'
        shell: bash
        run: |
          mkdir -p site
          git -C site init
          git -C site checkout --orphan gh-pages
          git -C site remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      - name: Create badge artifacts
        shell: bash
        run: |
          ci_message="${CI_MESSAGE:-failing}"
          ci_color="${CI_COLOR:-red}"
          if [[ "${TEST_RESULT}" != "success" || "${MEMORY_SMOKE_RESULT}" != "success" ]]; then
            ci_message="failing"
            ci_color="red"
          fi

          printf '{"schemaVersion":1,"label":"CI","message":"%s","color":"%s"}\n' "${ci_message}" "${ci_color}" > site/ci.json
          if [[ -n "${COVERAGE}" && -n "${COLOR}" ]]; then
            printf '{"schemaVersion":1,"label":"coverage","message":"%s%%","color":"%s"}\n' "${COVERAGE}" "${COLOR}" > site/coverage.json
          else
            printf '{"schemaVersion":1,"label":"coverage","message":"unknown","color":"lightgrey"}\n' > site/coverage.json
          fi
        env:
          COVERAGE: ${{ needs.test-and-coverage.outputs.coverage }}
          COLOR: ${{ needs.test-and-coverage.outputs.color }}
          CI_MESSAGE: ${{ needs.test-and-coverage.outputs.ci_message }}
          CI_COLOR: ${{ needs.test-and-coverage.outputs.ci_color }}
          TEST_RESULT: ${{ needs.test-and-coverage.result }}
          MEMORY_SMOKE_RESULT: ${{ needs.memory-smoke.result }}

      - name: Download benchmark artifact
        if: needs.benchmarks.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results

      - name: Build benchmark pages
        if: needs.benchmarks.result == 'success'
        run: >
          python3 ashiato-sync/scripts/ci/build_benchmark_pages.py
          --site-dir site
          --results-dir benchmark-results
          --history-url "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/benchmarks/history/index.json"

      - name: Commit Pages updates
        shell: bash
        run: |
          git -C site config user.name "github-actions[bot]"
          git -C site config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C site add .
          if git -C site diff --cached --quiet; then
            echo "No Pages changes to publish."
            exit 0
          fi
          git -C site commit -m "Update Pages for ${GITHUB_SHA::12}"
          git -C site push origin HEAD:gh-pages
