name: CI

on:
  pull_request:
  push:
  workflow_dispatch:
    inputs:
      benchmark_subset:
        description: Benchmark subset to run
        required: true
        default: characteristic
        type: choice
        options:
          - characteristic
          - cpu
          - bandwidth
          - all
      cpu_benchmark_filter:
        description: Optional Google Benchmark regex. Overrides the default CPU subset.
        required: false
        default: ''
        type: string
      bandwidth_scenarios:
        description: Optional comma-separated scenarios. Valid examples are ball_snap_baseline, ball_buffered_latency, prediction_rollback_mixed.
        required: false
        default: ''
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    name: Build, test, and coverage
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: kage-sync

    steps:
      - name: Check out kage-sync
        uses: actions/checkout@v4
        with:
          path: kage-sync

      - name: Check out kagesoko ECS
        uses: actions/checkout@v4
        with:
          repository: ErikGoldman/kagesoto
          path: main
          token: ${{ secrets.KAGESOTO_CHECKOUT_TOKEN || github.token }}

      - name: Configure
        run: >
          cmake -S . -B build-coverage
          -DCMAKE_BUILD_TYPE=Debug
          -DBUILD_TESTING=ON
          -DKAGE_SYNC_BUILD_BENCHMARKS=OFF
          -DKAGE_SYNC_BUILD_EXAMPLES=OFF
          -DKAGE_SYNC_BUILD_TRACE_VIEWER=OFF
          -DKAGE_SYNC_ENABLE_COVERAGE=ON

      - name: Build tests, run tests, and collect coverage
        run: cmake --build build-coverage --parallel --target coverage

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: kage-sync/build-coverage/coverage

  benchmarks:
    name: Characteristic benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    defaults:
      run:
        working-directory: kage-sync

    steps:
      - name: Check out kage-sync
        uses: actions/checkout@v4
        with:
          path: kage-sync

      - name: Check out kagesoko ECS
        uses: actions/checkout@v4
        with:
          repository: ErikGoldman/kagesoto
          path: main
          token: ${{ secrets.KAGESOTO_CHECKOUT_TOKEN || github.token }}

      - name: Configure benchmarks
        run: >
          cmake -S . -B build-benchmarks
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DBUILD_TESTING=OFF
          -DKAGE_SYNC_BUILD_BENCHMARKS=ON
          -DKAGE_SYNC_BUILD_EXAMPLES=OFF
          -DKAGE_SYNC_BUILD_TRACE_VIEWER=OFF
          -DKAGE_SYNC_KAGESOKO_SOURCE_DIR=${{ github.workspace }}/main

      - name: Build benchmarks
        run: cmake --build build-benchmarks --parallel --target kage_sync_benchmark kage_sync_ball_stress kage_sync_prediction_stress

      - name: Run benchmarks
        run: >
          python3 scripts/ci/run_benchmarks.py
          --build-dir build-benchmarks
          --output-dir benchmark-results
          --subset "${{ inputs.benchmark_subset || 'characteristic' }}"
          --cpu-filter "${{ inputs.cpu_benchmark_filter || '' }}"
          --bandwidth-scenarios "${{ inputs.bandwidth_scenarios || '' }}"
          --commit "${{ github.sha }}"
          --ref "${{ github.ref_name }}"
          --run-id "${{ github.run_id }}"
          --run-attempt "${{ github.run_attempt }}"
          --repository "${{ github.repository }}"

      - name: Upload benchmark result artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: kage-sync/benchmark-results

  pages:
    name: Publish Pages
    runs-on: ubuntu-latest
    needs:
      - coverage
      - benchmarks
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Check out kage-sync
        uses: actions/checkout@v4
        with:
          path: kage-sync

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: site

      - name: Download benchmark artifact
        uses: actions/download-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results

      - name: Build benchmark pages
        run: >
          python3 kage-sync/scripts/ci/build_benchmark_pages.py
          --site-dir site
          --results-dir benchmark-results
          --history-url "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/benchmarks/history/index.json"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy Pages
        uses: actions/deploy-pages@v4
